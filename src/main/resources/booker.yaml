openapi: 3.0.0
info:
  title: Restful-booker Models
  version: 1.0.0
  description: Только модели данных для API бронирования

paths: {}

components:
  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: password123

    AuthResponse:
      type: object
      properties:
        token:
          type: string

    BookingId:
      type: object
      properties:
        bookingid:
          type: integer

    Booking:
      type: object
      required:
        - firstname
        - lastname
        - totalprice
        - depositpaid
        - bookingdates
      properties:
        firstname:
          type: string
        lastname:
          type: string
        totalprice:
          type: integer
        depositpaid:
          type: boolean
        bookingdates:
          $ref: '#/components/schemas/BookingDates'
        additionalneeds:
          type: string

    BookingDates:
      type: object
      required:
        - checkin
        - checkout
      properties:
        checkin:
          type: string
          format: date
          example: "2024-01-01"
        checkout:
          type: string
          format: date
          example: "2024-01-10"

    BookingResponse:
      type: object
      properties:
        bookingid:
          type: integer
        booking:
          $ref: '#/components/schemas/Booking'